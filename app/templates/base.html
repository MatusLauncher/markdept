<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Markdept{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header class="container-fluid">
    <nav>
      <ul>
        <li><strong><a href="/dashboard">Markdept</a></strong></li>
      </ul>
      <ul>
        {% if user %}
        <li><a href="/campaigns">Campaigns</a></li>
        <li><a href="/posts">Posts</a></li>
        <li><a href="/platforms">Platforms</a></li>
        <li><a href="/analytics">Analytics</a></li>
        <li>
          <form action="/auth/logout" method="post" style="margin:0">
            <button type="submit" class="outline secondary">Logout ({{ user.display_name or user.email or "User" }})</button>
          </form>
        </li>
        {% else %}
        <li><a href="/auth/login" role="button">Connect with Anthropic</a></li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main class="container">
    {% if flash %}
    <div class="flash {{ flash.type }}">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
