{% extends "base.html" %}
{% block title %}Posts – Markdept{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center">
  <h1>Posts</h1>
  <a href="/posts/new" role="button">New Post</a>
</div>

<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem">
  <button class="outline" onclick="filterPosts('')">All</button>
  <button class="outline" onclick="filterPosts('draft')">Draft</button>
  <button class="outline" onclick="filterPosts('scheduled')">Scheduled</button>
  <button class="outline" onclick="filterPosts('published')">Published</button>
  <button class="outline" onclick="filterPosts('failed')">Failed</button>
</div>

<div id="posts-list">
  <article aria-busy="true"><p>Loading posts…</p></article>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/posts.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  loadPosts(params.get('status') || '');
</script>
{% endblock %}
