{% extends "base.html" %}
{% block title %}New Post – Markdept{% endblock %}
{% block content %}
<h1>New Post</h1>
<article>
  <form id="post-form">
    <div class="grid">
      <label>
        Platform Account
        <select name="platform_account_id" id="platform-select" required onchange="updatePlatform(this)">
          <option value="">— Select —</option>
          {% for p in platforms %}
          <option value="{{ p.id }}" data-platform="{{ p.platform }}">{{ p.platform }} — {{ p.account_name }}</option>
          {% endfor %}
        </select>
      </label>
      <label>
        Campaign (optional)
        <select name="campaign_id">
          <option value="">— None —</option>
          {% for c in campaigns %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <div id="youtube-fields" style="display:none">
      <label>Video Title <input type="text" name="video_title" placeholder="Enter video title"></label>
      <label>Tags (comma-separated) <input type="text" name="video_tags_raw" placeholder="tag1, tag2"></label>
      <label>Video File Path <input type="text" name="video_file_path" placeholder="/path/to/video.mp4"></label>
    </div>

    <div style="display:flex;gap:1rem;align-items:flex-end;margin-bottom:0.5rem">
      <div style="flex:1">
        <label>Topic for AI Generation
          <input type="text" id="gen-topic" placeholder="What should Claude write about?">
        </label>
      </div>
      <button type="button" onclick="generateContent()">Generate with Claude</button>
    </div>

    <label>
      Content
      <textarea name="content" id="post-content" rows="6" required placeholder="Write your post or generate with Claude…"></textarea>
    </label>
    <small id="char-count">0 characters</small>

    <label>
      Schedule (leave empty to save as draft)
      <input type="datetime-local" name="scheduled_at" id="scheduled-at">
    </label>

    <div class="grid">
      <button type="submit">Save Post</button>
      <button type="button" onclick="publishNow()" id="publish-now-btn">Publish Now</button>
      <a href="/posts" role="button" class="outline secondary">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}
{% block scripts %}
<script src="/static/js/posts.js"></script>
<script>
function updatePlatform(sel) {
  const platform = sel.options[sel.selectedIndex].dataset.platform;
  document.getElementById('youtube-fields').style.display = platform === 'youtube' ? 'block' : 'none';
}
document.getElementById('post-content').addEventListener('input', e => {
  document.getElementById('char-count').textContent = e.target.value.length + ' characters';
});
document.getElementById('post-form').addEventListener('submit', async e => {
  e.preventDefault();
  await savePost(new FormData(e.target));
});
</script>
{% endblock %}
