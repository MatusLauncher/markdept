{% extends "base.html" %}
{% block title %}New Campaign – Markdept{% endblock %}
{% block content %}
<h1>New Campaign</h1>
<article>
  <form id="campaign-form">
    <label>Name <input type="text" name="name" required placeholder="Q1 Product Launch"></label>
    <label>Topic <input type="text" name="topic" required placeholder="Describe what this campaign is about"></label>
    <label>Goals <textarea name="goals" required rows="3" placeholder="Increase brand awareness, drive signups…"></textarea></label>
    <label>Description (optional) <textarea name="description" rows="2"></textarea></label>
    <fieldset>
      <legend>Target Platforms</legend>
      <label><input type="checkbox" name="platforms" value="mastodon"> Mastodon</label>
      <label><input type="checkbox" name="platforms" value="linkedin"> LinkedIn</label>
      <label><input type="checkbox" name="platforms" value="lemmy"> Lemmy</label>
      <label><input type="checkbox" name="platforms" value="youtube"> YouTube</label>
    </fieldset>
    <div class="grid">
      <label>Start Date <input type="datetime-local" name="start_date"></label>
      <label>End Date <input type="datetime-local" name="end_date"></label>
    </div>
    <div class="grid">
      <button type="submit">Create Campaign</button>
      <a href="/campaigns" role="button" class="outline secondary">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}
{% block scripts %}
<script src="/static/js/campaigns.js"></script>
<script>
document.getElementById('campaign-form').addEventListener('submit', async e => {
  e.preventDefault();
  await createCampaign(new FormData(e.target));
});
</script>
{% endblock %}
