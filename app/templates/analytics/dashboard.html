{% extends "base.html" %}
{% block title %}Analytics – Markdept{% endblock %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center">
  <h1>Analytics</h1>
  <div style="display:flex;gap:0.5rem">
    <button onclick="fetchLatestMetrics()" class="outline">Refresh Metrics</button>
    <button onclick="showReportForm()" >Generate Report</button>
  </div>
</div>

<div class="grid" id="analytics-summary">
  <article><p>Loading…</p></article>
</div>

<section>
  <h2>Post Performance</h2>
  <div id="posts-analytics">
    <article aria-busy="true"><p>Loading analytics…</p></article>
  </div>
</section>

<section>
  <h2>Reports</h2>
  <div id="report-form" style="display:none">
    <article>
      <h3>Generate Analytics Report</h3>
      <form id="gen-report-form">
        <label>Report Title <input type="text" name="title" required placeholder="Q1 Performance Report"></label>
        <div class="grid">
          <label>From <input type="datetime-local" name="date_range_start" required></label>
          <label>To <input type="datetime-local" name="date_range_end" required></label>
        </div>
        <label>
          Campaign (optional)
          <select name="campaign_id" id="report-campaign-select">
            <option value="">All Campaigns</option>
          </select>
        </label>
        <button type="submit">Generate with Claude</button>
      </form>
    </article>
  </div>
  <div id="reports-list">
    <article aria-busy="true"><p>Loading reports…</p></article>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/analytics.js"></script>
<script>loadAnalytics();</script>
{% endblock %}
